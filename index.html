<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeXsensiV1 - Admin Dashboard</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --panel-bg: rgba(20, 20, 35, 0.6);
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #1a153a 0%, #0a0a12 100%);
            min-height: 100vh;
        }

        h1 {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        label {
            font-weight: bold;
            color: var(--neon-cyan);
        }

        select {
            background: #121225;
            color: #fff;
            border: 1px solid var(--neon-cyan);
            padding: 10px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        button {
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 10px 20px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
        }

        button:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        th {
            color: var(--neon-cyan);
            text-transform: uppercase;
            font-size: 14px;
        }

        .status-online {
            color: #00ff66;
            text-shadow: 0 0 5px #00ff66;
            font-weight: bold;
        }

        .status-offline {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>FakeXsensiV1 - Panel Admin</h1>

    <div class="container">
        <div class="form-group">
            <button onclick="checkServerStatus()">Tcheke Sèvè Proxy</button>
            <span id="serverStatus" class="status-offline">POKO VERIFYE</span>
        </div>

        <div style="margin-top: 20px; border-top: 1px solid rgba(0, 240, 255, 0.2); padding-top: 20px;">
            <p><strong>Sistèm Enjeksyon:</strong> <span style="color: var(--neon-cyan);">AKTIF (Pò 9999/Render Bypass)</span></p>
            <p><strong>Mesaj ki Enjekte:</strong> <span style="color: #00ff66;">FAKE TECH DEVIL INJECT</span></p>
        </div>
    </div>

    <script>
        // ⚠️ ENPÒTAN: Ranplase lyen sa a ak lyen Render pa w la lè l fin Live
        const API_URL = "https://proxytest-qm84.onrender.com/"; 

        async function checkServerStatus() {
            const statusLabel = document.getElementById('serverStatus');
            statusLabel.innerText = "N AP VERIFYE...";
            statusLabel.className = "";
            
            try {
                const response = await fetch(`${API_URL}/status`);
                const data = await response.json();
                
                if (data.status === "online") {
                    statusLabel.innerText = "ONLINE (FAKE TECH IN)";
                    statusLabel.className = "status-online";
                } else {
                    statusLabel.innerText = "OFFLINE";
                    statusLabel.className = "status-offline";
                }
            } catch (error) {
                statusLabel.innerText = "OFFLINE (ERÈ KONEKSYON)";
                statusLabel.className = "status-offline";
            }
        }
    </script>
</body>
</html>
